<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('lottery.jpeg') no-repeat center center fixed;
            background-size: cover;
        }
        .container {
            background-color: #ffffff;
            border: 2px solid #007bff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            width: 400px;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #007bff;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            color: #333333;
            text-align: left;
        }
        input {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .reset-section {
            margin-top: 20px;
            display: none;
        }
    </style>
    <script>
        function toggleResetSection() {
            document.querySelector('.reset-section').style.display = 'block';
        }

        function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            if (newPassword) {
                alert('Password reset successfully! You can now log in with your new password.');
                // In real applications, save the new password securely in the backend here
            } else {
                alert('Please enter a new password.');
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Forgot Password</h1>
        <form onsubmit="event.preventDefault(); toggleResetSection();">
            <label>
                <input type="radio" name="resetOption" value="email" required>
                Reset via Email
            </label>
            <label>
                <input type="radio" name="resetOption" value="phone">
                Reset via Phone Number
            </label>
            <input type="text" placeholder="Enter your Email or Phone Number" required>
            <button type="submit">Reset</button>
        </form>
        <div class="reset-section">
            <h3>Enter New Password</h3>
            <input type="password" id="newPassword" placeholder="Enter your new password" required>
            <button onclick="resetPassword()">Submit</button>
        </div>
    </div>
</body>
</html>
